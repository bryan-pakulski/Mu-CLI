{% if messages %}
  {% for m in messages %}
    <article class="msg {{ 'role-user' if m.role == 'user' else 'role-assistant' }}">
      <div class="msg-meta">{{ m.role }}</div>
      <div class="bubble">{{ m.content }}</div>
    </article>
  {% endfor %}
{% else %}
  <article class="msg role-assistant">
    <div class="msg-meta">assistant</div>
    <div class="bubble">No messages yet. Start the conversation below.</div>
  </article>
{% endif %}
