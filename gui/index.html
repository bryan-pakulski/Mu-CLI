<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mu-CLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link id="hljsDark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" />
    <link id="hljsLight" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" disabled />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">μCLI</div>

        <div class="section-head">
          <h2>Sessions</h2>
          <button id="newSessionBtn" class="btn btn-primary">+ New</button>
        </div>
        <div id="sessionList" class="session-list"></div>

        <h2>Runtime</h2>
        <label class="field">
          API Base
          <input id="apiBaseInput" type="text" value="http://127.0.0.1:8765" />
        </label>
        <label class="field">
          Model
          <select id="modelInput"></select>
        </label>
        <button id="applyRuntimeBtn" class="btn">Apply</button>
        <div id="statusBadge" class="status-badge">Disconnected</div>

        <h2>Workspace</h2>
        <div class="workspace-head">
          <span id="workspaceStatus" class="workspace-status">(none)</span>
          <div class="workspace-actions">
            <button id="addWorkspaceBtn" type="button" class="btn">+ Add</button>
            <button id="removeWorkspaceBtn" type="button" class="btn">Remove</button>
          </div>
        </div>
      </aside>

      <main class="main-panel">
        <section class="feed-wrap">
          <button id="settingsBtn" class="settings-btn" title="Settings">⚙</button>
          <section id="feed" class="feed" aria-live="polite"></section>

          <form id="composer" class="composer" enctype="multipart/form-data">
            <div class="composer-top">
              <button id="fileBtn" type="button" class="icon-btn" title="Attach file">+</button>
              <input id="fileInput" type="file" hidden />
              <button id="menuBtn" type="button" class="icon-btn" title="Chat options">...</button>
              <div id="chatMenu" class="chat-menu hidden">
                <label><input id="agenticToggle" type="checkbox" /> Agentic</label>
                <label><input id="thinkingToggle" type="checkbox" /> Thinking</label>
              </div>
            </div>
            <div class="composer-row">
              <textarea id="messageInput" rows="2" placeholder="Type a message..."></textarea>
              <button id="sendBtn" class="btn send-btn" type="submit">Send</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <div id="settingsModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <div class="modal-layout">
          <nav class="settings-nav" id="settingsTabs">
            <button class="settings-tab active" data-tab="tools">Tools</button>
            <button class="settings-tab" data-tab="variables">Variables</button>
            <button class="settings-tab" data-tab="memory">Memory</button>
            <button class="settings-tab" data-tab="theme">Theme</button>
          </nav>

          <section class="settings-main">
            <div class="settings-pane active" data-pane="tools">
              <h3>Tools</h3>
              <div id="toolsList" class="settings-list"></div>
            </div>
            <div class="settings-pane" data-pane="variables">
              <h3>Variables</h3>
              <div id="variablesList" class="settings-list"></div>
            </div>
            <div class="settings-pane" data-pane="memory">
              <h3>Memory</h3>
              <div id="memoryList" class="settings-list"></div>
            </div>
            <div class="settings-pane" data-pane="theme">
              <h3>Theme</h3>
              <label class="field">Mode
                <select id="themeModeSelect">
                  <option value="dark">Dark</option>
                  <option value="light">Light</option>
                </select>
              </label>
              <label class="field">Accent
                <select id="accentSelect">
                  <option value="indigo">Indigo</option>
                  <option value="teal">Teal</option>
                  <option value="amber">Amber</option>
                  <option value="rose">Rose</option>
                </select>
              </label>
            </div>

            <div class="modal-actions">
              <button id="saveSettingsBtn" class="btn btn-primary">Save</button>
              <button id="closeSettingsBtn" class="btn">Close</button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.12/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
