<div class="panel">
  <h3>Settings</h3>
  <form
    hx-post="/ui/settings"
    hx-target="#settings-panel"
    hx-swap="innerHTML"
    hx-on::after-request="setTimeout(()=>{ const el=document.querySelector('#state-panel'); if (el) htmx.trigger(el,'refresh'); }, 50)"
  >
    <div class="kv">
      <div>Provider</div>
      <div>
        <select name="provider">
          {% for p in ['echo','openai','gemini'] %}
          <option value="{{ p }}" {% if p == provider %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>

      <div>Model</div>
      <div>
        <input name="model" value="{{ model }}" list="models-list" class="mono" />
        <datalist id="models-list">
          {% for m in models %}
          <option value="{{ m }}"></option>
          {% endfor %}
        </datalist>
      </div>

      <div>Approvals</div>
      <div>
        <select name="approval_mode">
          {% for mode in ['ask','auto','deny'] %}
          <option value="{{ mode }}" {% if mode == approval_mode %}selected{% endif %}>{{ mode }}</option>
          {% endfor %}
        </select>
      </div>

      <div>Workspace</div>
      <div><input name="workspace" value="{{ workspace }}" class="mono" /></div>

      <div>Runtime sec</div>
      <div><input type="number" min="60" step="30" name="max_runtime_seconds" value="{{ max_runtime_seconds }}" /></div>

      <div>Condense</div>
      <div><input type="checkbox" name="condense_enabled" {% if condense_enabled %}checked{% endif %} /></div>

      <div>Condense win</div>
      <div><input type="number" min="4" step="1" name="condense_window" value="{{ condense_window }}" /></div>

      <div>Debug</div>
      <div><input type="checkbox" name="debug" {% if debug %}checked{% endif %} /></div>

      <div>Agentic</div>
      <div><input type="checkbox" name="agentic_planning" {% if agentic_planning %}checked{% endif %} /></div>

      <div>Research</div>
      <div><input type="checkbox" name="research_mode" {% if research_mode %}checked{% endif %} /></div>
    </div>

    <div class="actions">
      <button type="submit">Save settings</button>
      {% if saved %}<span class="muted">Saved.</span>{% endif %}
    </div>
  </form>
</div>
