<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mu-CLI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">μCLI</div>

        <div class="section-head">
          <h2>Sessions</h2>
          <button id="newSessionBtn" class="btn btn-primary">+ New</button>
        </div>
        <div id="sessionList" class="session-list"></div>

        <h2>Settings</h2>
        <label class="field">
          API Base
          <input id="apiBaseInput" type="text" value="http://127.0.0.1:8765" />
        </label>
        <label class="field">
          Model
          <select id="modelInput"></select>
        </label>
        <div class="toggle-row">
          <label><input id="agenticToggle" type="checkbox" /> Agentic</label>
          <label><input id="thinkingToggle" type="checkbox" /> Thinking</label>
        </div>
        <button id="applyRuntimeBtn" class="btn">Apply</button>
        <div id="statusBadge" class="status-badge">Disconnected</div>
      </aside>

      <main class="main-panel">
        <section class="feed-wrap">
          <section id="feed" class="feed" aria-live="polite"></section>
        </section>

        <form id="composer" class="composer">
          <textarea id="messageInput" rows="2" placeholder="Type a message..."></textarea>
          <button id="sendBtn" class="btn btn-primary" type="submit">Send</button>
        </form>
      </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.12/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
