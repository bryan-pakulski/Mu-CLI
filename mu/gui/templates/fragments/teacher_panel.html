<aside class="teacher-panel"
       x-show="$store.mode.active === 'teacher'"
       x-transition.opacity.duration.200ms>

    <!-- empty state when no course is active -->
    <div class="teacher-empty" x-show="!$store.teacher.course">
        <h3>no course active</h3>
        <p class="muted">In chat: <code>/teach new &lt;subject&gt;</code> to start one,
        or <code>/teach load &lt;id&gt;</code> to resume.</p>
        <div class="teacher-courses-list" x-show="($store.teacher.courses || []).length">
            <h4>courses on disk</h4>
            <template x-for="c in $store.teacher.courses" :key="c.course_id">
                <div class="teacher-course-row"
                     @click="$store.teacher.switchCourse(c.course_id)"
                     :title="'Resume course ' + c.course_id">
                    <span class="mono" x-text="c.course_id"></span>
                    <span x-text="c.subject"></span>
                    <span class="tag" x-text="c.status"></span>
                </div>
            </template>
        </div>
    </div>

    <!-- header summary -->
    <div class="teacher-head" x-show="$store.teacher.course">
        <div class="teacher-subject" x-text="$store.teacher.course && $store.teacher.course.subject"></div>
        <div class="teacher-meta mono muted">
            <span class="tag" x-text="$store.teacher.course && $store.teacher.course.status"></span>
            <span x-text="($store.teacher.course && $store.teacher.course.lessons_completed_count || 0)
                + ' / ' + ($store.teacher.course && $store.teacher.course.lesson_total || 0)
                + ' lessons'"></span>
            <span class="muted"
                  x-show="$store.teacher.course && $store.teacher.course.target_level"
                  x-text="'· ' + ($store.teacher.course && $store.teacher.course.target_level)"></span>
        </div>
        <!-- Course switcher: lets the user jump to another course in the
             registry without typing the /teach load command by hand. -->
        <div class="teacher-courses-strip"
             x-show="($store.teacher.courses || []).length > 1">
            <template x-for="c in $store.teacher.courses" :key="c.course_id">
                <button class="course-chip"
                        :class="{ active: c.is_active }"
                        @click="!c.is_active && $store.teacher.switchCourse(c.course_id)"
                        :title="c.course_id + ' (' + (c.status || '?') + ')'">
                    <span class="mono" x-text="c.course_id"></span>
                    <span class="muted" x-show="c.lesson_total"
                          x-text="' · ' + (c.lessons_completed_count || 0) + '/' + c.lesson_total"></span>
                </button>
            </template>
        </div>
    </div>

    <!-- learner profile -->
    <section class="teacher-section"
             x-show="$store.teacher.course"
             :class="{ open: $store.teacher.openSections.profile }">
        <button class="teacher-section-head"
                @click="$store.teacher.toggleSection('profile')"
                :aria-expanded="$store.teacher.openSections.profile">
            <span class="caret">›</span>
            <span class="teacher-section-name">learner</span>
            <span class="teacher-section-count mono muted"
                  x-show="$store.teacher.course
                          && $store.teacher.course.learner_profile
                          && $store.teacher.course.learner_profile.recorded_at"
                  x-text="$store.teacher.formatTimestamp(
                            ($store.teacher.course.learner_profile || {}).recorded_at)"></span>
        </button>
        <div class="teacher-section-body" x-show="$store.teacher.openSections.profile"
             x-transition.opacity.duration.150ms>
            <template x-if="$store.teacher.course && $store.teacher.course.learner_profile && Object.keys($store.teacher.course.learner_profile).length">
                <div class="learner-grid">
                    <!-- array fields → chip rows -->
                    <template x-for="field in $store.teacher.profileTagFields()" :key="field">
                        <div class="learner-row"
                             x-show="(($store.teacher.course.learner_profile || {})[field] || []).length">
                            <div class="learner-key" x-text="field.replace(/_/g, ' ')"></div>
                            <div class="learner-vals">
                                <template x-for="item in ($store.teacher.course.learner_profile[field] || [])"
                                          :key="item">
                                    <span class="tag" x-text="item"></span>
                                </template>
                            </div>
                        </div>
                    </template>
                    <!-- scalar fields → text rows -->
                    <template x-for="field in $store.teacher.profileTextFields()" :key="field">
                        <div class="learner-row"
                             x-show="!!(($store.teacher.course.learner_profile || {})[field])">
                            <div class="learner-key" x-text="field.replace(/_/g, ' ')"></div>
                            <div class="learner-vals">
                                <span x-text="$store.teacher.course.learner_profile[field]"></span>
                            </div>
                        </div>
                    </template>
                    <!-- calibration history (compact) -->
                    <div class="learner-row"
                         x-show="(($store.teacher.course.learner_profile || {}).calibration_history || []).length">
                        <div class="learner-key">calibration</div>
                        <div class="learner-vals">
                            <span class="mono muted"
                                  x-text="(($store.teacher.course.learner_profile.calibration_history || []).length)
                                          + ' entries'"></span>
                        </div>
                    </div>
                </div>
            </template>
            <div class="empty-row"
                 x-show="!($store.teacher.course && $store.teacher.course.learner_profile && Object.keys($store.teacher.course.learner_profile).length)">
                no diagnostic recorded yet
            </div>
        </div>
    </section>

    <!-- curriculum tree -->
    <section class="teacher-section"
             x-show="$store.teacher.course"
             :class="{ open: $store.teacher.openSections.curriculum }">
        <button class="teacher-section-head"
                @click="$store.teacher.toggleSection('curriculum')"
                :aria-expanded="$store.teacher.openSections.curriculum">
            <span class="caret">›</span>
            <span class="teacher-section-name">curriculum</span>
            <span class="teacher-section-count mono muted"
                  x-text="($store.teacher.course && $store.teacher.course.lessons || []).length + ' lessons'"></span>
        </button>
        <div class="teacher-section-body" x-show="$store.teacher.openSections.curriculum"
             x-transition.opacity.duration.150ms>
            <div class="curriculum-tree"
                 x-show="$store.teacher.course && ($store.teacher.course.modules || []).length">
                <template x-for="m in ($store.teacher.course && $store.teacher.course.modules) || []"
                          :key="m.module_id">
                    <div class="curriculum-module"
                         :class="{ current: m.module_id === ($store.teacher.course && $store.teacher.course.current_module_id) }">
                        <div class="curriculum-module-head">
                            <span class="status-glyph"
                                  x-text="$store.teacher.statusGlyph(m.status)"></span>
                            <span class="title" x-text="m.title || m.module_id"></span>
                            <span class="meta mono muted"
                                  x-text="$store.teacher.moduleProgress(m).done + '/' + $store.teacher.moduleProgress(m).total"></span>
                        </div>
                        <div class="module-progress"
                             x-show="$store.teacher.moduleProgress(m).total">
                            <div class="module-progress-bar"
                                 :style="'width: ' + $store.teacher.moduleProgress(m).pct + '%;'"></div>
                        </div>
                        <div class="module-goal muted" x-show="m.goal" x-text="m.goal"></div>
                        <div class="curriculum-lessons">
                            <template x-for="l in (m.lessons || [])" :key="l.lesson_id">
                                <div class="curriculum-lesson"
                                     :class="{ current: l.lesson_id === ($store.teacher.course && $store.teacher.course.current_lesson_id) }"
                                     :title="l.lesson_id + (l.concept_brief ? ' — ' + l.concept_brief : '')">
                                    <div class="curriculum-lesson-inner">
                                        <span class="status-glyph"
                                              x-text="$store.teacher.statusGlyph(l.status)"></span>
                                        <span class="lesson-title"
                                              x-text="l.title || l.lesson_id"></span>
                                        <span class="lesson-meta mono muted"
                                              x-show="l.lecture_comprehension_pct !== null && l.lecture_comprehension_pct !== undefined"
                                              x-text="(l.lecture_comprehension_pct || 0) + '%'"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
            <div class="empty-row"
                 x-show="$store.teacher.course && !($store.teacher.course.modules || []).length">
                curriculum not proposed yet
            </div>
        </div>
    </section>

    <!-- current lesson detail -->
    <section class="teacher-section"
             x-show="$store.teacher.course && $store.teacher.currentLesson()"
             :class="{ open: $store.teacher.openSections.current }">
        <button class="teacher-section-head"
                @click="$store.teacher.toggleSection('current')"
                :aria-expanded="$store.teacher.openSections.current">
            <span class="caret">›</span>
            <span class="teacher-section-name">current lesson</span>
            <span class="teacher-section-count mono muted"
                  x-show="$store.teacher.currentLesson()"
                  x-text="$store.teacher.currentLesson() && $store.teacher.currentLesson().lesson_id"></span>
        </button>
        <div class="teacher-section-body" x-show="$store.teacher.openSections.current"
             x-transition.opacity.duration.150ms>
            <template x-if="$store.teacher.currentLesson()">
                <div class="current-lesson">
                    <div class="lesson-title" x-text="$store.teacher.currentLesson().title"></div>
                    <div class="lesson-status mono muted">
                        <span x-text="$store.teacher.currentLesson().status"></span>
                        <span x-show="$store.teacher.currentModule()"
                              x-text="' · ' + ($store.teacher.currentModule() ? $store.teacher.currentModule().title : '')"></span>
                    </div>
                    <div class="lesson-brief"
                         x-show="$store.teacher.currentLesson().concept_brief"
                         x-text="$store.teacher.currentLesson().concept_brief"></div>
                    <div class="lesson-objectives"
                         x-show="(($store.teacher.currentLesson().learning_objectives || [])).length">
                        <h5>objectives</h5>
                        <ul>
                            <template x-for="obj in $store.teacher.currentLesson().learning_objectives" :key="obj">
                                <li x-text="obj"></li>
                            </template>
                        </ul>
                    </div>
                    <div class="lesson-stats mono muted">
                        <span x-text="$store.teacher.currentLesson().lecture_turn_count + ' lecture turns'"></span>
                        <span x-show="$store.teacher.currentLesson().lecture_comprehension_pct !== null && $store.teacher.currentLesson().lecture_comprehension_pct !== undefined"
                              x-text="' · ' + $store.teacher.currentLesson().lecture_comprehension_pct + '% comprehension'"></span>
                        <span x-show="$store.teacher.currentLesson().remediation_count"
                              x-text="' · ' + $store.teacher.currentLesson().remediation_count + ' remediations'"></span>
                    </div>
                </div>
            </template>
        </div>
    </section>

    <!-- all assignments (not just graded) -->
    <section class="teacher-section"
             x-show="$store.teacher.course && $store.teacher.allAssignments().length"
             :class="{ open: $store.teacher.openSections.assignments }">
        <button class="teacher-section-head"
                @click="$store.teacher.toggleSection('assignments')"
                :aria-expanded="$store.teacher.openSections.assignments">
            <span class="caret">›</span>
            <span class="teacher-section-name">assignments</span>
            <span class="teacher-section-count mono muted"
                  x-text="$store.teacher.allAssignments().length"></span>
        </button>
        <div class="teacher-section-body" x-show="$store.teacher.openSections.assignments"
             x-transition.opacity.duration.150ms>
            <template x-for="a in $store.teacher.allAssignments()" :key="a.assignment_id">
                <div class="grade-row"
                     :class="{ passed: a.grade && a.grade.passed,
                               failed: a.grade && !a.grade.passed,
                               pending: !a.grade }">
                    <div class="grade-line">
                        <span class="status-glyph"
                              x-text="a.grade
                                ? (a.grade.passed ? '✓' : '✗')
                                : $store.teacher.statusGlyph(a.status)"></span>
                        <span class="mono" x-text="a.assignment_id"></span>
                        <span class="muted mono small" x-text="a.kind || a.status"></span>
                        <span class="mono" style="margin-left:auto;"
                              x-text="(a.grade && a.grade.score_pct !== undefined && a.grade.score_pct !== null)
                                ? (a.grade.score_pct + '%')
                                : (a.pass_threshold ? '≥' + a.pass_threshold + '%' : a.status || '·')"></span>
                    </div>
                    <div class="grade-feedback muted"
                         x-show="a.grade && a.grade.feedback"
                         x-text="a.grade.feedback"></div>
                </div>
            </template>
        </div>
    </section>

    <!-- scheduled reviews -->
    <section class="teacher-section"
             x-show="$store.teacher.course && $store.teacher.scheduledReviews().length"
             :class="{ open: $store.teacher.openSections.reviews }">
        <button class="teacher-section-head"
                @click="$store.teacher.toggleSection('reviews')"
                :aria-expanded="$store.teacher.openSections.reviews">
            <span class="caret">›</span>
            <span class="teacher-section-name">reviews</span>
            <span class="teacher-section-count mono muted"
                  x-text="$store.teacher.scheduledReviews().length"></span>
        </button>
        <div class="teacher-section-body" x-show="$store.teacher.openSections.reviews"
             x-transition.opacity.duration.150ms>
            <template x-for="(r, i) in $store.teacher.scheduledReviews()" :key="i">
                <div class="review-row">
                    <span class="mono" x-text="r.lesson_id || r.assignment_id || '?'"></span>
                    <span class="muted mono small"
                          x-show="r.due_at"
                          x-text="$store.teacher.formatTimestamp(r.due_at)"></span>
                    <span class="muted" x-show="r.reason" x-text="r.reason"></span>
                </div>
            </template>
        </div>
    </section>

    <!-- diagnostic footer: where the data came from -->
    <div class="teacher-footnote muted mono"
         x-show="$store.teacher.coursePath"
         :title="'Course data read from ' + $store.teacher.coursePath"
         x-text="'↳ ' + $store.teacher.coursePath"></div>

</aside>
