<div id="trace-lines">
{% if traces %}
{% for line in traces %}
• {{ line }}
{% endfor %}
{% else %}
No trace events yet.
{% endif %}
</div>

<div id="session-stats">
<span class="mono">session={{ session }}</span> ·
provider={{ provider }} ·
<span class="mono">model={{ model }}</span> ·
approvals={{ approval_mode }} ·
debug={{ 'on' if debug else 'off' }} ·
workspace={{ workspace or 'none' }}
</div>
