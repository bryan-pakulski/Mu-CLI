<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mu_cli GUI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --bg-1: #0f1220;
      --bg-2: #1b2542;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-strong: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f3f6ff;
      --muted: #c6d0ef;
      --purple-soft: rgba(161, 133, 246, 0.17);
      --assistant-soft: rgba(116, 174, 255, 0.12);
      --orange-soft: rgba(255, 174, 90, 0.18);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, var(--bg-2), var(--bg-1)) fixed;
      color: var(--text);
      font-size: 14px;
    }

    .app-shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 12px;
      padding: 10px;
      transition: grid-template-columns .2s ease;
    }

    .app-shell.sidebar-hidden {
      grid-template-columns: minmax(0, 1fr);
    }

    .glass {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px) saturate(135%);
      -webkit-backdrop-filter: blur(14px) saturate(135%);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      border-radius: 14px;
    }

    .sidebar {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .app-shell.sidebar-hidden .sidebar {
      display: none;
    }

    .panel {
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: rgba(9, 14, 33, 0.28);
      border: 1px solid var(--border);
    }

    .panel h3 {
      font-size: 12px;
      margin: 0 0 6px;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: #f4f7ff;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 12px;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    .title {
      font-weight: 600;
      font-size: 16px;
    }

    .status-pill {
      margin-left: auto;
      border-radius: 10px;
      font-size: 11px;
      padding: 2px 10px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(0, 0, 0, 0.2);
    }

    .chat-layout {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto;
      gap: 8px;
      padding: 10px;
      overflow: hidden;
    }

    .messages {
      min-height: 0;
      overflow: auto;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(8, 14, 34, 0.48);
    }

    .trace {
      min-height: 0;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(8, 14, 34, 0.48);
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
    }

    .msg { margin-bottom: 10px; }
    .role {
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #aebbe4;
    }

    .bubble {
      margin-top: 3px;
      padding: 9px;
      border-radius: 10px;
      border: 1px solid var(--border);
      line-height: 1.45;
    }
    .msg.role-user .bubble { background: var(--purple-soft); }
    .msg.role-assistant .bubble { background: var(--assistant-soft); }

    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: rgba(0, 0, 0, 0.35);
      padding: 1px 4px;
      border-radius: 6px;
      color: #ffe9ff;
    }
    .bubble pre {
      margin: 7px 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.35);
      overflow-x: auto;
      white-space: pre;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .tool-toggle {
      margin-top: 4px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--orange-soft);
      overflow: hidden;
    }

    .tool-toggle > summary {
      list-style: none;
      cursor: pointer;
      padding: 8px 10px;
      text-transform: uppercase;
      letter-spacing: .04em;
      font-size: 10px;
      color: #ffe5c3;
      border-bottom: 1px solid transparent;
    }

    .tool-toggle[open] > summary {
      border-bottom-color: rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.18);
    }

    .tool-toggle > summary::-webkit-details-marker { display: none; }
    .tool-toggle > summary::before { content: '▸ '; }
    .tool-toggle[open] > summary::before { content: '▾ '; }

    .trace-line { display: block; margin-bottom: 4px; }
    .trace-model { color: #cabfff; }
    .trace-request { color: #ffd09d; }
    .trace-run { color: #b1f3d1; }

    .form-control, .form-select {
      background: rgba(0, 0, 0, 0.25);
      border-color: var(--border);
      color: var(--text);
      font-size: 12px;
      border-radius: 8px;
    }

    .form-control:focus, .form-select:focus {
      background: rgba(0, 0, 0, 0.34);
      color: var(--text);
      border-color: #8ca8ff;
      box-shadow: 0 0 0 .2rem rgba(100, 140, 255, 0.15);
    }

    .btn-glass {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.08);
      color: #edf2ff;
      border-radius: 8px;
    }

    .btn-glass:hover {
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
    }

    .btn-primary {
      border: none;
      background: linear-gradient(90deg, #5f85ff, #8674ff);
      border-radius: 8px;
    }

    .small-muted { color: var(--muted); font-size: 12px; }
    .approval-warning {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 188, 117, 0.45);
      background: rgba(255, 188, 117, 0.15);
      color: #ffe1b7;
      font-size: 12px;
      display: none;
    }

    details.trace-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(8, 14, 34, 0.28);
    }

    details.trace-wrap > summary {
      list-style: none;
      cursor: pointer;
      padding: 7px 10px;
      color: var(--muted);
      font-size: 11px;
      border-bottom: 1px solid transparent;
    }

    details.trace-wrap[open] > summary {
      border-bottom-color: var(--border);
      background: rgba(255, 255, 255, 0.04);
    }

    details.trace-wrap > summary::-webkit-details-marker { display: none; }
    details.trace-wrap > summary::before { content: '▸ '; }
    details.trace-wrap[open] > summary::before { content: '▾ '; }
  </style>
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar glass" id="sidebar">
      <div class="panel">
        <h3>Runtime settings</h3>
        <div class="small-muted mb-2">Auto-applies</div>

        <label class="small-muted mb-1">Provider</label>
        <select id="provider" class="form-select mb-2"></select>

        <label class="small-muted mb-1">Model</label>
        <select id="model" class="form-select mb-2"></select>

        <label class="small-muted mb-1">API key (optional)</label>
        <input id="apiKey" type="password" class="form-control mb-2" placeholder="sk-..." />

        <label class="small-muted mb-1">Approval mode</label>
        <select id="approval" class="form-select mb-2">
          <option>ask</option><option>auto</option><option>deny</option>
        </select>

        <label class="small-muted mb-1">Workspace path</label>
        <input id="workspace" class="form-control mb-2" placeholder="/path/to/repo" />

        <div class="form-check">
          <input class="form-check-input" id="debug" type="checkbox" />
          <label class="form-check-label small-muted" for="debug">Debug mode</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" id="agentic" type="checkbox" checked />
          <label class="form-check-label small-muted" for="agentic">Agentic planning</label>
        </div>
        <div id="approvalNote" class="approval-warning">Approval mode <strong>ask</strong> is not interactive in GUI and will deny mutating tools. Switch to <strong>auto</strong> or <strong>deny</strong>.</div>
      </div>

      <div class="panel">
        <h3>Session management</h3>
        <div class="small-muted mb-2" id="activeSession">active: -</div>

        <div class="input-group input-group-sm mb-2">
          <input id="sessionName" class="form-control" placeholder="session name" />
          <button id="newSession" class="btn btn-primary" type="button">New</button>
        </div>

        <select id="sessionList" class="form-select mb-2" size="6"></select>

        <div class="d-flex gap-2">
          <button id="loadSession" class="btn btn-glass btn-sm">Load</button>
          <button id="deleteSession" class="btn btn-glass btn-sm">Delete</button>
          <button id="refreshSessions" class="btn btn-glass btn-sm">Refresh</button>
        </div>
      </div>
    </aside>

    <section class="main">
      <div class="topbar">
        <button id="toggleSidebar" class="btn btn-glass btn-sm">☰</button>
        <div class="title">mu_cli GUI</div>
        <span id="meta" class="status-pill">loading...</span>
      </div>

      <div class="chat-layout glass">
        <div id="messages" class="messages"></div>
        <details class="trace-wrap" id="traceWrap">
          <summary>Debug traces</summary>
          <div id="traces" class="trace">debug traces will appear here</div>
        </details>

        <div>
          <textarea id="prompt" class="form-control" placeholder="Ask anything..."></textarea>
          <div class="d-flex align-items-center gap-2 mt-2">
            <button id="send" class="btn btn-primary btn-sm">Send</button>
            <div id="report" class="small-muted"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

<script>
const state = { models: {}, messages: [], traces: [] };
let syncing = false;
let applyTimer = null;
let sending = false;

async function api(path, method='GET', body=null) {
  const res = await fetch(path, {
    method,
    headers: {'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : null,
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'request failed');
  return json;
}

function roleClass(role) {
  return String(role || '').replace(/[^a-zA-Z0-9_\-]/g, '_');
}

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function formatMessageContent(content) {
  const source = String(content || '');
  const parts = source.split(/```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g);
  let html = '';

  for (let idx = 0; idx < parts.length; idx += 1) {
    if (idx % 3 === 0) {
      const text = parts[idx];
      if (!text) continue;
      const escaped = escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>');
      const paragraphs = escaped
        .split(/\n{2,}/)
        .map((segment) => `<p>${segment.replaceAll('\n', '<br/>')}</p>`)
        .join('');
      html += paragraphs;
      continue;
    }

    if (idx % 3 === 1) continue;

    const code = parts[idx] || '';
    html += `<pre><code>${escapeHtml(code)}</code></pre>`;
  }

  return html || '<p></p>';
}

function isToolRole(role) {
  return role === 'tool_result' || role === 'tool_call';
}

function shouldRenderMessage(message) {
  if (message.role !== 'assistant') return true;
  const content = String(message.content || '').trim();
  const toolCalls = (message.metadata && message.metadata.tool_calls) || [];
  return content.length > 0 || toolCalls.length > 0;
}

function renderMessages() {
  const box = document.getElementById('messages');
  box.innerHTML = '';

  for (const m of state.messages) {
    if (!shouldRenderMessage(m)) continue;

    const row = document.createElement('div');
    row.className = `msg role-${roleClass(m.role)}`;

    const roleEl = document.createElement('div');
    roleEl.className = 'role';
    roleEl.textContent = m.role;
    row.appendChild(roleEl);

    if (isToolRole(m.role)) {
      const details = document.createElement('details');
      details.className = 'tool-toggle';
      const summary = document.createElement('summary');
      summary.textContent = `${m.role.replace('_', ' ')} (click to expand)`;
      details.appendChild(summary);

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessageContent(m.content);
      details.appendChild(bubble);
      row.appendChild(details);
    } else {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessageContent(m.content);
      row.appendChild(bubble);
    }

    box.appendChild(row);
  }

  box.scrollTop = box.scrollHeight;
}

function renderTraces() {
  const el = document.getElementById('traces');
  if (!state.traces.length) {
    el.textContent = 'debug traces will appear here';
    return;
  }
  el.innerHTML = state.traces.map((line) => {
    let cls = 'trace-line';
    if (line.startsWith('model:')) cls += ' trace-model';
    else if (line.startsWith('tool-request:')) cls += ' trace-request';
    else if (line.startsWith('tool-run:')) cls += ' trace-run';
    return `<span class="${cls}">${line.replace(/</g, '&lt;')}</span>`;
  }).join('');
}

function renderSessions(list, active) {
  const sel = document.getElementById('sessionList');
  sel.innerHTML = '';
  for (const name of list) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === active) opt.selected = true;
    sel.appendChild(opt);
  }
  document.getElementById('activeSession').textContent = `active: ${active}`;
}

function wireModels(provider) {
  const modelSel = document.getElementById('model');
  modelSel.innerHTML = '';
  for (const model of (state.models[provider] || [])) {
    const opt = document.createElement('option');
    opt.value = model;
    opt.textContent = model;
    modelSel.appendChild(opt);
  }
}

function buildSettingsPayload() {
  return {
    provider: document.getElementById('provider').value,
    model: document.getElementById('model').value,
    api_key: document.getElementById('apiKey').value || null,
    approval_mode: document.getElementById('approval').value,
    workspace: document.getElementById('workspace').value || null,
    debug: document.getElementById('debug').checked,
    agentic_planning: document.getElementById('agentic').checked,
  };
}

function updateApprovalNote() {
  const show = document.getElementById('approval').value === 'ask';
  document.getElementById('approvalNote').style.display = show ? 'block' : 'none';
}

function scheduleApplySettings() {
  if (syncing) return;
  clearTimeout(applyTimer);
  applyTimer = setTimeout(() => applySettings().catch((e) => alert(e.message)), 250);
}

async function applySettings() {
  await api('/api/settings', 'POST', buildSettingsPayload());
  await refreshState();
}

async function refreshState() {
  syncing = true;
  const s = await api('/api/state');
  state.models = s.models;
  state.messages = s.messages;
  state.traces = s.traces;

  const providerSel = document.getElementById('provider');
  providerSel.innerHTML = '';
  Object.keys(s.models).forEach((p) => {
    const o = document.createElement('option');
    o.value = p;
    o.textContent = p;
    providerSel.appendChild(o);
  });
  providerSel.value = s.provider;
  wireModels(s.provider);
  document.getElementById('model').value = s.model;
  document.getElementById('approval').value = s.approval_mode;
  document.getElementById('workspace').value = s.workspace || '';
  document.getElementById('debug').checked = !!s.debug;
  document.getElementById('agentic').checked = !!s.agentic_planning;
  document.getElementById('meta').textContent = `${s.provider}:${s.model}`;

  updateApprovalNote();
  renderSessions(s.sessions, s.session);
  renderMessages();
  renderTraces();
  syncing = false;
}

async function sendPrompt() {
  if (sending) return;
  const text = document.getElementById('prompt').value.trim();
  if (!text) return;
  sending = true;
  document.getElementById('prompt').value = '';
  const reportEl = document.getElementById('report');
  reportEl.textContent = 'streaming...';

  state.messages.push({ role: 'user', content: text });
  let draft = null;
  renderMessages();

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!res.ok || !res.body) throw new Error('stream request failed');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.trim()) continue;
        const event = JSON.parse(line);
        if (event.type === 'assistant_chunk') {
          if (!draft) {
            draft = { role: 'assistant', content: '' };
            state.messages.push(draft);
          }
          draft.content += event.chunk;
          renderMessages();
        } else if (event.type === 'trace') {
          state.traces.push(event.line);
          state.traces = state.traces.slice(-50);
          renderTraces();
        } else if (event.type === 'report') {
          const r = event.report;
          reportEl.textContent =
            `in=${r.input_tokens} out=${r.output_tokens} total=${r.total_tokens} est=$${Number(r.estimated_cost_usd).toFixed(6)}`;
        } else if (event.type === 'error') {
          throw new Error(event.error || 'streaming failed');
        }
      }
    }

    await refreshState();
  } finally {
    sending = false;
  }
}

function resolveSessionName(action) {
  const selected = document.getElementById('sessionList').value;
  const typed = document.getElementById('sessionName').value.trim();
  if (action === 'new') return typed;
  return selected || typed;
}

async function sessionAction(action) {
  const name = resolveSessionName(action);
  await api('/api/session', 'POST', { action, name });
  await refreshState();
}

for (const id of ['provider', 'model', 'apiKey', 'approval', 'workspace', 'debug', 'agentic']) {
  document.getElementById(id).addEventListener('change', () => {
    if (id === 'provider') wireModels(document.getElementById('provider').value);
    if (id === 'approval') updateApprovalNote();
    scheduleApplySettings();
  });
  if (id === 'workspace' || id === 'apiKey') {
    document.getElementById(id).addEventListener('blur', scheduleApplySettings);
  }
}

document.getElementById('send').addEventListener('click', () => sendPrompt().catch((e) => alert(e.message)));
document.getElementById('newSession').addEventListener('click', () => sessionAction('new').catch((e) => alert(e.message)));
document.getElementById('refreshSessions').addEventListener('click', () => sessionAction('list').catch((e) => alert(e.message)));
document.getElementById('loadSession').addEventListener('click', () => sessionAction('load').catch((e) => alert(e.message)));
document.getElementById('deleteSession').addEventListener('click', () => sessionAction('delete').catch((e) => alert(e.message)));
document.getElementById('toggleSidebar').addEventListener('click', () => {
  document.getElementById('app').classList.toggle('sidebar-hidden');
});

document.getElementById('prompt').addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    sendPrompt().catch((err) => alert(err.message));
  }
});

refreshState().catch((e) => alert(e.message));
</script>
</body>
</html>
