<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mu_cli GUI</title>
  <style>
    :root { --bg:#0b1020; --panel:#121a33; --panel2:#1a2550; --text:#e8ecff; --muted:#b8c4f8; --border:#2a3a72; --accent:#7aa8ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,Segoe UI,Roboto,Arial; color:var(--text); background:var(--bg); }
    .app { display:grid; grid-template-columns: 330px 1fr; min-height:100vh; }
    .sidebar { background:var(--panel); border-right:1px solid var(--border); padding:1rem; overflow:auto; transition: all .2s; }
    .sidebar.collapsed { width:0; padding:0; overflow:hidden; border-right:none; }
    .main { display:flex; flex-direction:column; }
    .topbar { display:flex; align-items:center; gap:.6rem; padding:.8rem 1rem; border-bottom:1px solid var(--border); background:var(--panel2); }
    .title { font-weight:700; }
    .content { padding:1rem; display:grid; grid-template-rows: 1fr auto auto; gap:.75rem; height:calc(100vh - 56px); }
    .messages { border:1px solid var(--border); border-radius:10px; padding:1rem; overflow:auto; background:#101833; }
    .msg { margin-bottom:.85rem; }
    .role { font-size:.75rem; color:#a9b9f4; text-transform:uppercase; letter-spacing:.05em; }
    .bubble { margin-top:.2rem; background:#1a2550; border:1px solid var(--border); border-radius:8px; padding:.6rem .7rem; white-space:pre-wrap; }
    .inputrow { display:flex; gap:.5rem; }
    textarea,input,select,button { background:#0f1730; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:.5rem .6rem; }
    textarea { width:100%; min-height:88px; resize:vertical; }
    button { cursor:pointer; }
    .small { color:var(--muted); font-size:.85rem; }
    .group { margin-bottom:1rem; }
    .group h3 { margin:.2rem 0 .5rem; font-size:.95rem; }
    .trace { border:1px solid var(--border); border-radius:8px; background:#0f1730; padding:.6rem; max-height:140px; overflow:auto; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:.82rem; }
  </style>
</head>
<body>
  <div class="app">
    <aside id="sidebar" class="sidebar">
      <div class="group"><h3>Provider</h3><select id="provider"></select></div>
      <div class="group"><h3>Model</h3><select id="model"></select></div>
      <div class="group"><h3>API key (optional)</h3><input id="apiKey" type="password" placeholder="sk-..." /></div>
      <div class="group"><h3>Approval</h3><select id="approval"><option>ask</option><option>auto</option><option>deny</option></select></div>
      <div class="group"><h3>Workspace path</h3><input id="workspace" placeholder="/path/to/repo" /></div>
      <div class="group"><label><input id="debug" type="checkbox" /> Debug mode</label><br/><label><input id="agentic" type="checkbox" checked /> Agentic planning</label></div>
      <div class="group"><button id="applySettings">Apply settings</button></div>

      <div class="group"><h3>Session management</h3>
        <div class="small" id="activeSession">active: -</div>
        <div style="display:flex; gap:.4rem; margin:.5rem 0;"><input id="sessionName" placeholder="session name" /><button id="newSession">New</button></div>
        <div style="display:flex; gap:.4rem; margin:.5rem 0;"><button id="refreshSessions">Refresh</button></div>
        <select id="sessionList" size="6" style="width:100%;"></select>
        <div style="display:flex; gap:.4rem; margin-top:.5rem;"><button id="loadSession">Load</button><button id="deleteSession">Delete</button></div>
      </div>
    </aside>

    <section class="main">
      <div class="topbar"><button id="toggleSidebar">☰</button><div class="title">mu_cli GUI</div><div class="small" id="meta"></div></div>
      <div class="content">
        <div id="messages" class="messages"></div>
        <div class="trace" id="traces"></div>
        <div>
          <div class="inputrow"><textarea id="prompt" placeholder="Ask anything..."></textarea></div>
          <div class="inputrow" style="margin-top:.5rem;"><button id="send">Send</button><div class="small" id="report"></div></div>
        </div>
      </div>
    </section>
  </div>

<script>
const state = { models: {}, messages: [], traces: [] };

async function api(path, method='GET', body=null) {
  const res = await fetch(path, { method, headers:{'Content-Type':'application/json'}, body: body?JSON.stringify(body):null });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'request failed');
  return json;
}

function renderMessages() {
  const box = document.getElementById('messages');
  box.innerHTML = '';
  for (const m of state.messages) {
    const row = document.createElement('div'); row.className='msg';
    row.innerHTML = `<div class="role">${m.role}</div><div class="bubble">${m.content}</div>`;
    box.appendChild(row);
  }
  box.scrollTop = box.scrollHeight;
}

function renderTraces() {
  document.getElementById('traces').textContent = state.traces.join('\n') || 'debug traces will appear here';
}

function renderSessions(list, active) {
  const sel = document.getElementById('sessionList');
  sel.innerHTML = '';
  for (const name of list) {
    const opt = document.createElement('option'); opt.value=name; opt.textContent=name;
    if (name === active) opt.selected = true;
    sel.appendChild(opt);
  }
  document.getElementById('activeSession').textContent = `active: ${active}`;
}

function wireModels(provider) {
  const modelSel = document.getElementById('model');
  modelSel.innerHTML = '';
  for (const model of (state.models[provider] || [])) {
    const opt = document.createElement('option'); opt.value=model; opt.textContent=model;
    modelSel.appendChild(opt);
  }
}

async function refreshState() {
  const s = await api('/api/state');
  state.models = s.models;
  state.messages = s.messages;
  state.traces = s.traces;

  const providerSel = document.getElementById('provider');
  providerSel.innerHTML = '';
  Object.keys(s.models).forEach(p => {
    const o = document.createElement('option'); o.value=p; o.textContent=p; providerSel.appendChild(o);
  });
  providerSel.value = s.provider;
  wireModels(s.provider);
  document.getElementById('model').value = s.model;
  document.getElementById('approval').value = s.approval_mode;
  document.getElementById('workspace').value = s.workspace || '';
  document.getElementById('debug').checked = !!s.debug;
  document.getElementById('agentic').checked = !!s.agentic_planning;
  document.getElementById('meta').textContent = `${s.provider}:${s.model}`;
  renderSessions(s.sessions, s.session);
  renderMessages();
  renderTraces();
}

async function sendPrompt() {
  const text = document.getElementById('prompt').value.trim();
  if (!text) return;
  document.getElementById('prompt').value='';
  const result = await api('/api/chat', 'POST', {text});
  state.messages.push({role:'assistant', content:result.reply.content});
  state.traces = result.traces;
  const r = result.report;
  document.getElementById('report').textContent = `in=${r.input_tokens} out=${r.output_tokens} total=${r.total_tokens} est=$${Number(r.estimated_cost_usd).toFixed(6)}`;
  await refreshState();
}

async function applySettings() {
  await api('/api/settings', 'POST', {
    provider: document.getElementById('provider').value,
    model: document.getElementById('model').value,
    api_key: document.getElementById('apiKey').value || null,
    approval_mode: document.getElementById('approval').value,
    workspace: document.getElementById('workspace').value || null,
    debug: document.getElementById('debug').checked,
    agentic_planning: document.getElementById('agentic').checked,
  });
  await refreshState();
}

async function sessionAction(action) {
  const selected = document.getElementById('sessionList').value;
  const typed = document.getElementById('sessionName').value.trim();
  const name = typed || selected;
  await api('/api/session', 'POST', {action, name});
  await refreshState();
}

document.getElementById('provider').addEventListener('change', (e)=> wireModels(e.target.value));
document.getElementById('send').addEventListener('click', ()=>sendPrompt().catch(e=>alert(e.message)));
document.getElementById('applySettings').addEventListener('click', ()=>applySettings().catch(e=>alert(e.message)));
document.getElementById('newSession').addEventListener('click', ()=>sessionAction('new').catch(e=>alert(e.message)));
document.getElementById('refreshSessions').addEventListener('click', ()=>sessionAction('list').catch(e=>alert(e.message)));
document.getElementById('loadSession').addEventListener('click', ()=>sessionAction('load').catch(e=>alert(e.message)));
document.getElementById('deleteSession').addEventListener('click', ()=>sessionAction('delete').catch(e=>alert(e.message)));
document.getElementById('toggleSidebar').addEventListener('click', ()=>document.getElementById('sidebar').classList.toggle('collapsed'));

refreshState().catch(e=>alert(e.message));
</script>
</body>
</html>
