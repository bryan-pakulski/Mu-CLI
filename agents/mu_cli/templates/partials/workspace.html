<div class="panel">
  <h3>Workspace</h3>
  <div class="kv">
    <div>Active</div><div class="mono">{{ workspace or 'none' }}</div>
  </div>
  <div class="actions">
    <button type="button" @click="$dispatch('open-modal', {url:'/ui/workspace/modal', title:'Workspace management'})" class="primary">Manage workspace</button>
    {% if message %}<span class="muted">{{ message }}</span>{% endif %}
  </div>
</div>
