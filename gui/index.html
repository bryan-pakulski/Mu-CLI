<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mu-CLI Chat Console</title>
    <link rel="stylesheet" href="/gui/assets/styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="panel left">
        <div class="panel-title">Control panel</div>

        <section class="block">
          <h3>Runtime</h3>
          <label for="providers">Provider</label>
          <input id="providers" value="ollama" />
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="interactive">interactive</option>
            <option value="research">research</option>
            <option value="debugging">debugging</option>
            <option value="yolo">yolo</option>
          </select>
          <label for="policy">Policy profile</label>
          <input id="policy" value="default" />
          <button id="save-config" class="btn primary">Apply config</button>
        </section>

        <section class="block">
          <h3>Workspace</h3>
          <label for="workspace">Workspace path</label>
          <input id="workspace" value="/tmp/work" />
        </section>

        <section class="block">
          <h3>Session</h3>
          <div class="row compact">
            <button id="create-session" class="btn">New</button>
            <button id="refresh-sessions" class="btn">Refresh</button>
          </div>
          <label for="session-select">Active session</label>
          <select id="session-select"></select>
          <div class="session-actions">
            <button id="clear-chat" class="btn">Clear history</button>
            <button id="condense-chat" class="btn">Condense</button>
          </div>
          <div id="session-summary" class="muted">No session selected.</div>
          <div id="session-state" class="state-pill idle">idle</div>
        </section>

        <section class="block">
          <h3>Interventions</h3>
          <div class="row compact">
            <button id="cancel-job" class="btn warn">Cancel</button>
            <button id="resume-job" class="btn">Resume</button>
          </div>
        </section>
      </aside>

      <button
        id="left-resizer"
        class="resizer resizer-left"
        type="button"
        aria-label="Resize left panel"
        title="Drag to resize"
      ></button>

      <main class="panel center">
        <header class="chat-header">
          <div class="brand-wrap">
            <button id="toggle-left" class="icon-btn" type="button" aria-label="Toggle left panel">☰</button>
            <div class="brand">mu_cli</div>
            <span id="active-model" class="pill">provider: ollama</span>
          </div>
          <div class="header-actions">
            <div id="active-status" class="state-pill idle">idle</div>
            <button id="toggle-right" class="icon-btn" type="button" aria-label="Toggle right panel">☷</button>
          </div>
        </header>

        <section class="chat-window" id="chat-window">
          <div class="empty-state">Start by creating/selecting a session, then send a prompt.</div>
        </section>

        <section class="composer">
          <textarea id="goal" rows="3" placeholder="Message mu_cli..."></textarea>
          <div class="row">
            <button id="create-job" class="btn primary">Send</button>
            <button id="refresh-approvals" class="btn">Refresh approvals</button>
          </div>
        </section>
      </main>

      <button
        id="right-resizer"
        class="resizer resizer-right"
        type="button"
        aria-label="Resize right panel"
        title="Drag to resize"
      ></button>

      <aside class="panel right">
        <div class="panel-title">Session metadata</div>

        <section class="block">
          <h3>Live backend feed</h3>
          <div class="meta-filters" id="meta-filters">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="loop_step">Tool loop</button>
            <button class="chip" data-filter="job_state">Status</button>
            <button class="chip" data-filter="log">Logs</button>
            <button class="chip" data-filter="policy">Policy</button>
            <button class="chip" data-filter="approval">Approval</button>
          </div>
          <ul id="timeline" class="meta-list"></ul>
        </section>

        <section class="block">
          <h3>Pending approvals</h3>
          <ul id="approvals" class="meta-list"></ul>
        </section>
      </aside>
    </div>

    <script src="/gui/assets/app.js"></script>
  </body>
</html>
