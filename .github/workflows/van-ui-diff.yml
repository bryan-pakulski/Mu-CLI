name: van-ui-diff

on:
  workflow_dispatch:
  push:
    paths:
      - "gui/**"
      - "tools/van_ui_screenshot_diff.mjs"
      - ".github/workflows/van-ui-diff.yml"

jobs:
  screenshot-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install screenshot tooling
        run: |
          npm install --no-save playwright pixelmatch pngjs
          npx playwright install --with-deps chromium

      - name: Generate legacy vs van screenshots and diff
        run: node tools/van_ui_screenshot_diff.mjs

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v4
        with:
          name: van-ui-diff-artifacts
          path: documentation/artifacts/van_phase2/
