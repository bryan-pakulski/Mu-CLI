<form hx-post="/ui/session" hx-target="#session-panel" hx-swap="innerHTML" hx-on::after-request="htmx.trigger(document.body,'refresh'); if(event.detail.successful){ window.dispatchEvent(new CustomEvent('close-modal')); }">
  <input type="hidden" name="action" value="new" />
  <div class="kv">
    <div>Name</div><div><input name="name" required placeholder="feature-branch" /></div>
    <div>Provider</div>
    <div>
      <select name="provider" hx-get="/ui/session/new" hx-trigger="change" hx-target="#modal-content" hx-include="closest form" hx-swap="innerHTML">
        {% for p in ['echo','openai','gemini'] %}
        <option value="{{ p }}" {% if p == provider %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
      </select>
    </div>
    <div>Model</div>
    <div>
      <select name="model" class="mono">
        {% for m in models %}
        <option value="{{ m }}" {% if m == model %}selected{% endif %}>{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div>Approvals</div>
    <div>
      <select name="approval_mode">
        {% for mode in ['ask','auto','deny'] %}
        <option value="{{ mode }}" {% if mode == approval_mode %}selected{% endif %}>{{ mode }}</option>
        {% endfor %}
      </select>
    </div>
    <div>Agentic</div><div><input type="checkbox" name="agentic_planning" {% if agentic_planning %}checked{% endif %} /></div>
    <div>Research</div><div><input type="checkbox" name="research_mode" {% if research_mode %}checked{% endif %} /></div>
  </div>
  <div class="actions">
    <button type="submit" class="send-btn">Create session</button>
  </div>
</form>
