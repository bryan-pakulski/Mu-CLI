<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mu_cli GUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    :root {
      --bg: #f5f6ff;
      --bg-soft: #eef0ff;
      --glass: rgba(255,255,255,0.7);
      --glass-strong: rgba(255,255,255,0.84);
      --border: rgba(130,120,200,0.28);
      --text: #2a2342;
      --muted: #6f6891;
      --purple: #7a62e8;
      --purple-soft: rgba(122, 98, 232, 0.12);
      --user-soft: rgba(122, 98, 232, 0.14);
      --assistant-soft: rgba(151, 121, 245, 0.09);
      --tool-soft: rgba(170, 140, 255, 0.14);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #fbfbff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    .shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0,1fr);
      gap: 10px;
      padding: 10px;
      transition: grid-template-columns .18s ease;
    }
    .shell.sidebar-hidden { grid-template-columns: minmax(0,1fr); }
    .shell.sidebar-hidden .sidebar { display: none; }

    .glass {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(12px) saturate(120%);
      -webkit-backdrop-filter: blur(12px) saturate(120%);
      box-shadow: 0 10px 24px rgba(96, 83, 155, 0.08);
    }

    .sidebar {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .panel {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass-strong);
      margin-bottom: 8px;
    }

    .panel h3 {
      margin: 0 0 6px;
      font-size: 11px;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #4d3f81;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0,1fr);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass-strong);
    }

    .title { font-size: 14px; font-weight: 600; color: #3c2f71; }
    .pill {
      margin-left: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 8px;
      color: var(--muted);
      font-size: 11px;
      background: rgba(255,255,255,0.68);
    }

    .chat-layout {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0,1fr) auto auto;
      gap: 8px;
      padding: 10px;
      overflow: hidden;
    }

    .messages {
      min-height: 0;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.72);
      padding: 8px;
    }

    .trace-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.65);
      overflow: hidden;
    }

    .trace-wrap > summary {
      list-style: none;
      cursor: pointer;
      padding: 6px 10px;
      color: var(--muted);
      border-bottom: 1px solid transparent;
      font-size: 11px;
    }

    .trace-wrap[open] > summary {
      border-bottom-color: var(--border);
      background: rgba(255,255,255,0.7);
    }
    .trace-wrap > summary::-webkit-details-marker { display: none; }

    .trace {
      max-height: 140px;
      overflow: auto;
      padding: 8px;
      font-size: 11px;
      white-space: pre-wrap;
    }

    .msg { margin-bottom: 8px; }
    .role { font-size: 10px; color: #8478b0; text-transform: uppercase; letter-spacing: .06em; }
    .bubble {
      margin-top: 3px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      line-height: 1.45;
      background: #fff;
    }
    .msg.role-user .bubble { background: var(--user-soft); }
    .msg.role-assistant .bubble { background: var(--assistant-soft); }

    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      background: rgba(122,98,232,0.12);
      color: #533db0;
      padding: 1px 4px;
      border-radius: 4px;
    }
    .bubble pre {
      margin: 6px 0;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #faf9ff;
      overflow-x: auto;
      white-space: pre;
      font-size: 12px;
    }

    .tool-toggle {
      margin-top: 3px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--tool-soft);
    }
    .tool-toggle > summary {
      list-style: none;
      cursor: pointer;
      padding: 7px 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #6c52d2;
    }
    .tool-toggle > summary::-webkit-details-marker { display: none; }

    .trace-line { display: block; margin-bottom: 4px; }
    .trace-model { color: #7058d1; }
    .trace-request { color: #8d6ff2; }
    .trace-run { color: #5f5f9b; }

    .form-control, .form-select {
      font-size: 12px;
      border-radius: 8px;
      border-color: var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.8);
    }
    .form-control:focus, .form-select:focus {
      border-color: #a58df7;
      box-shadow: 0 0 0 .2rem rgba(123,98,232,.12);
    }

    .btn-soft {
      border: 1px solid var(--border);
      color: #4a3c81;
      background: rgba(255,255,255,0.84);
      border-radius: 8px;
      font-size: 12px;
    }
    .btn-soft:hover { background: #fff; }

    .btn-accent {
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #7a62e8, #967bff);
      color: #fff;
      font-size: 12px;
    }

    .small-muted { color: var(--muted); font-size: 11px; }
    .approval-warning {
      margin-top: 6px;
      padding: 7px 8px;
      border: 1px solid rgba(172, 132, 255, 0.45);
      background: rgba(172, 132, 255, 0.14);
      border-radius: 8px;
      color: #5a459e;
      font-size: 11px;
      display: none;
    }

    .thinking {
      display: none;
      align-items: center;
      gap: 6px;
      color: #5f49bb;
      font-size: 11px;
    }

    .usage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 6px;
      font-size: 11px;
    }

    .usage-chip {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      background: rgba(255,255,255,0.72);
    }
  </style>
</head>
<body>
  <div id="app" class="shell">
    <aside id="sidebar" class="sidebar glass">
      <div class="panel">
        <h3>Runtime</h3>
        <div class="small-muted mb-2">Auto-applies</div>

        <label class="small-muted mb-1">Provider</label>
        <select id="provider" class="form-select mb-2"></select>

        <label class="small-muted mb-1">Model</label>
        <select id="model" class="form-select mb-2"></select>

        <label class="small-muted mb-1">API key</label>
        <input id="apiKey" type="password" class="form-control mb-2" placeholder="sk-..." />

        <label class="small-muted mb-1">Approval mode</label>
        <select id="approval" class="form-select mb-2"><option>ask</option><option>auto</option><option>deny</option></select>

        <label class="small-muted mb-1">Workspace path</label>
        <input id="workspace" class="form-control mb-2" placeholder="/path/to/repo" />

        <div class="form-check">
          <input class="form-check-input" id="debug" type="checkbox" />
          <label class="form-check-label small-muted" for="debug">Debug mode</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" id="agentic" type="checkbox" checked />
          <label class="form-check-label small-muted" for="agentic">Agentic planning</label>
        </div>

        <div id="approvalNote" class="approval-warning">`ask` is non-interactive in GUI; mutating tools are denied here.</div>
      </div>

      <div class="panel">
        <h3>Sessions</h3>
        <div class="small-muted mb-2" id="activeSession">active: -</div>

        <div class="input-group input-group-sm mb-2">
          <input id="sessionName" class="form-control" placeholder="session name" />
          <button id="newSession" class="btn btn-accent" type="button">New</button>
        </div>

        <select id="sessionList" class="form-select mb-2" size="5"></select>

        <div class="d-flex gap-2">
          <button id="loadSession" class="btn btn-soft btn-sm">Load</button>
          <button id="deleteSession" class="btn btn-soft btn-sm">Delete</button>
          <button id="refreshSessions" class="btn btn-soft btn-sm">Refresh</button>
        </div>
      </div>

      <div class="panel">
        <h3>Pricing (global)</h3>
        <div class="small-muted mb-2">Input/output cost per 1M tokens</div>
        <label class="small-muted mb-1">Provider</label>
        <input id="pricingProvider" class="form-control mb-2" />
        <label class="small-muted mb-1">Model</label>
        <input id="pricingModel" class="form-control mb-2" />
        <label class="small-muted mb-1">Input per 1M (USD)</label>
        <input id="pricingInput" type="number" step="0.000001" class="form-control mb-2" />
        <label class="small-muted mb-1">Output per 1M (USD)</label>
        <input id="pricingOutput" type="number" step="0.000001" class="form-control mb-2" />
        <button id="savePricing" class="btn btn-soft btn-sm">Save pricing</button>
      </div>

      <div class="panel">
        <h3>Session usage</h3>
        <div class="usage-grid">
          <div class="usage-chip"><div class="small-muted">Input</div><div id="usageIn">0</div></div>
          <div class="usage-chip"><div class="small-muted">Output</div><div id="usageOut">0</div></div>
          <div class="usage-chip"><div class="small-muted">Total</div><div id="usageTotal">0</div></div>
          <div class="usage-chip"><div class="small-muted">Cost USD</div><div id="usageCost">0.000000</div></div>
        </div>
      </div>
    </aside>

    <section class="main">
      <div class="topbar">
        <button id="toggleSidebar" class="btn btn-soft btn-sm">☰</button>
        <div class="title">mu_cli</div>
        <div id="thinking" class="thinking"><span class="spinner-border spinner-border-sm"></span><span>AI thinking…</span></div>
        <span id="meta" class="pill">loading...</span>
      </div>

      <div class="chat-layout glass">
        <div id="messages" class="messages"></div>

        <details class="trace-wrap" id="traceWrap">
          <summary>Debug traces</summary>
          <div id="traces" class="trace">debug traces will appear here</div>
        </details>

        <div>
          <textarea id="prompt" class="form-control" placeholder="Ask anything..."></textarea>
          <div class="d-flex align-items-center gap-2 mt-2">
            <button id="send" class="btn btn-accent btn-sm">Send</button>
            <div id="report" class="small-muted"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

<script>
const state = { models: {}, messages: [], traces: [], pricing: {}, sessionUsage: {} };
let syncing = false;
let applyTimer = null;
let sending = false;

async function api(path, method='GET', body=null) {
  const res = await fetch(path, {
    method,
    headers: {'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : null,
  });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'request failed');
  return json;
}

function roleClass(role) {
  return String(role || '').replace(/[^a-zA-Z0-9_\-]/g, '_');
}

function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function formatMessageContent(content) {
  const source = String(content || '');
  const parts = source.split(/```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g);
  let html = '';

  for (let idx = 0; idx < parts.length; idx += 1) {
    if (idx % 3 === 0) {
      const text = parts[idx];
      if (!text) continue;
      const escaped = escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>');
      html += escaped
        .split(/\n{2,}/)
        .map((segment) => `<p>${segment.replaceAll('\n', '<br/>')}</p>`)
        .join('');
      continue;
    }
    if (idx % 3 === 1) continue;
    html += `<pre><code>${escapeHtml(parts[idx] || '')}</code></pre>`;
  }

  return html || '<p></p>';
}

function isToolRole(role) {
  return role === 'tool_result' || role === 'tool_call';
}

function shouldRenderMessage(message) {
  if (message.role !== 'assistant') return true;
  const content = String(message.content || '').trim();
  const toolCalls = (message.metadata && message.metadata.tool_calls) || [];
  return content.length > 0 || toolCalls.length > 0;
}

function renderMessages() {
  const box = document.getElementById('messages');
  box.innerHTML = '';

  for (const m of state.messages) {
    if (!shouldRenderMessage(m)) continue;

    const row = document.createElement('div');
    row.className = `msg role-${roleClass(m.role)}`;
    row.innerHTML = `<div class="role">${m.role}</div>`;

    if (isToolRole(m.role)) {
      const details = document.createElement('details');
      details.className = 'tool-toggle';
      details.innerHTML = `<summary>${m.role.replace('_', ' ')} (expand)</summary><div class="bubble">${formatMessageContent(m.content)}</div>`;
      row.appendChild(details);
    } else {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatMessageContent(m.content);
      row.appendChild(bubble);
    }

    box.appendChild(row);
  }

  box.scrollTop = box.scrollHeight;
}

function renderTraces() {
  const el = document.getElementById('traces');
  if (!state.traces.length) {
    el.textContent = 'debug traces will appear here';
    return;
  }
  el.innerHTML = state.traces.map((line) => {
    let cls = 'trace-line';
    if (line.startsWith('model:')) cls += ' trace-model';
    else if (line.startsWith('tool-request:')) cls += ' trace-request';
    else if (line.startsWith('tool-run:')) cls += ' trace-run';
    return `<span class="${cls}">${line.replace(/</g, '&lt;')}</span>`;
  }).join('');
}

function renderSessions(list, active) {
  const sel = document.getElementById('sessionList');
  sel.innerHTML = '';
  for (const name of list) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === active) opt.selected = true;
    sel.appendChild(opt);
  }
  document.getElementById('activeSession').textContent = `active: ${active}`;
}

function wireModels(provider) {
  const modelSel = document.getElementById('model');
  modelSel.innerHTML = '';
  for (const model of (state.models[provider] || [])) {
    const opt = document.createElement('option');
    opt.value = model;
    opt.textContent = model;
    modelSel.appendChild(opt);
  }
}

function buildSettingsPayload() {
  return {
    provider: document.getElementById('provider').value,
    model: document.getElementById('model').value,
    api_key: document.getElementById('apiKey').value || null,
    approval_mode: document.getElementById('approval').value,
    workspace: document.getElementById('workspace').value || null,
    debug: document.getElementById('debug').checked,
    agentic_planning: document.getElementById('agentic').checked,
  };
}

function updateApprovalNote() {
  const show = document.getElementById('approval').value === 'ask';
  document.getElementById('approvalNote').style.display = show ? 'block' : 'none';
}

function updateThinking(show) {
  document.getElementById('thinking').style.display = show ? 'flex' : 'none';
}

function updateUsagePanel(usage) {
  const u = usage || {};
  document.getElementById('usageIn').textContent = String(Math.trunc(Number(u.input_tokens || 0)));
  document.getElementById('usageOut').textContent = String(Math.trunc(Number(u.output_tokens || 0)));
  document.getElementById('usageTotal').textContent = String(Math.trunc(Number(u.total_tokens || 0)));
  document.getElementById('usageCost').textContent = Number(u.estimated_cost_usd || 0).toFixed(6);
}

function syncPricingEditor() {
  const provider = document.getElementById('provider').value;
  const model = document.getElementById('model').value;
  document.getElementById('pricingProvider').value = provider;
  document.getElementById('pricingModel').value = model;
  const row = (((state.pricing || {})[provider] || {})[model]) || { input_per_1m: 0, output_per_1m: 0 };
  document.getElementById('pricingInput').value = Number(row.input_per_1m || 0);
  document.getElementById('pricingOutput').value = Number(row.output_per_1m || 0);
}

function scheduleApplySettings() {
  if (syncing) return;
  clearTimeout(applyTimer);
  applyTimer = setTimeout(() => applySettings().catch((e) => alert(e.message)), 250);
}

async function applySettings() {
  await api('/api/settings', 'POST', buildSettingsPayload());
  await refreshState();
}

async function savePricing() {
  await api('/api/pricing', 'POST', {
    provider: document.getElementById('pricingProvider').value.trim(),
    model: document.getElementById('pricingModel').value.trim(),
    input_per_1m: Number(document.getElementById('pricingInput').value || 0),
    output_per_1m: Number(document.getElementById('pricingOutput').value || 0),
  });
  await refreshState();
}

async function refreshState() {
  syncing = true;
  const s = await api('/api/state');
  state.models = s.models;
  state.messages = s.messages;
  state.traces = s.traces;
  state.pricing = s.pricing || {};
  state.sessionUsage = s.session_usage || {};

  const providerSel = document.getElementById('provider');
  providerSel.innerHTML = '';
  Object.keys(s.models).forEach((p) => {
    const o = document.createElement('option');
    o.value = p;
    o.textContent = p;
    providerSel.appendChild(o);
  });
  providerSel.value = s.provider;
  wireModels(s.provider);
  document.getElementById('model').value = s.model;
  document.getElementById('approval').value = s.approval_mode;
  document.getElementById('workspace').value = s.workspace || '';
  document.getElementById('debug').checked = !!s.debug;
  document.getElementById('agentic').checked = !!s.agentic_planning;
  document.getElementById('meta').textContent = `${s.provider}:${s.model}`;

  updateApprovalNote();
  syncPricingEditor();
  updateUsagePanel(state.sessionUsage);
  renderSessions(s.sessions, s.session);
  renderMessages();
  renderTraces();
  syncing = false;
}

async function sendPrompt() {
  if (sending) return;
  const text = document.getElementById('prompt').value.trim();
  if (!text) return;

  sending = true;
  updateThinking(true);
  document.getElementById('prompt').value = '';

  const reportEl = document.getElementById('report');
  reportEl.textContent = 'streaming...';

  state.messages.push({ role: 'user', content: text });
  let draft = null;
  renderMessages();

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    if (!res.ok || !res.body) throw new Error('stream request failed');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.trim()) continue;
        const event = JSON.parse(line);
        if (event.type === 'assistant_chunk') {
          updateThinking(false);
          if (!draft) {
            draft = { role: 'assistant', content: '' };
            state.messages.push(draft);
          }
          draft.content += event.chunk;
          renderMessages();
        } else if (event.type === 'trace') {
          state.traces.push(event.line);
          state.traces = state.traces.slice(-50);
          renderTraces();
        } else if (event.type === 'report') {
          const r = event.report;
          reportEl.textContent =
            `in=${r.input_tokens} out=${r.output_tokens} total=${r.total_tokens} est=$${Number(r.estimated_cost_usd).toFixed(6)}`;
        } else if (event.type === 'error') {
          throw new Error(event.error || 'streaming failed');
        }
      }
    }

    await refreshState();
  } finally {
    updateThinking(false);
    sending = false;
  }
}

function resolveSessionName(action) {
  const selected = document.getElementById('sessionList').value;
  const typed = document.getElementById('sessionName').value.trim();
  if (action === 'new') return typed;
  return selected || typed;
}

async function sessionAction(action) {
  const name = resolveSessionName(action);
  await api('/api/session', 'POST', { action, name });
  await refreshState();
}

for (const id of ['provider', 'model', 'apiKey', 'approval', 'workspace', 'debug', 'agentic']) {
  document.getElementById(id).addEventListener('change', () => {
    if (id === 'provider') wireModels(document.getElementById('provider').value);
    if (id === 'approval') updateApprovalNote();
    scheduleApplySettings();
    syncPricingEditor();
  });
  if (id === 'workspace' || id === 'apiKey') {
    document.getElementById(id).addEventListener('blur', scheduleApplySettings);
  }
}

document.getElementById('send').addEventListener('click', () => sendPrompt().catch((e) => alert(e.message)));
document.getElementById('newSession').addEventListener('click', () => sessionAction('new').catch((e) => alert(e.message)));
document.getElementById('refreshSessions').addEventListener('click', () => sessionAction('list').catch((e) => alert(e.message)));
document.getElementById('loadSession').addEventListener('click', () => sessionAction('load').catch((e) => alert(e.message)));
document.getElementById('deleteSession').addEventListener('click', () => sessionAction('delete').catch((e) => alert(e.message)));
document.getElementById('savePricing').addEventListener('click', () => savePricing().catch((e) => alert(e.message)));
document.getElementById('toggleSidebar').addEventListener('click', () => document.getElementById('app').classList.toggle('sidebar-hidden'));

document.getElementById('prompt').addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendPrompt().catch((err) => alert(err.message));
});

refreshState().catch((e) => alert(e.message));
</script>
</body>
</html>
