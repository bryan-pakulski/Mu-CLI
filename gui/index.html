<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mu-CLI Chat Console</title>
    <link rel="stylesheet" href="/gui/assets/styles.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="panel left">
        <div class="panel-title">Control panel</div>

        <section class="block">
          <h3>Runtime</h3>
          <label for="providers">Provider</label>
          <select id="providers"></select>
          <label for="model">Model</label>
          <select id="model"></select>
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="interactive">interactive</option>
            <option value="research">research</option>
            <option value="debugging">debugging</option>
            <option value="yolo">yolo</option>
          </select>
          <label for="policy">Policy profile</label>
          <select id="policy"></select>
          <button id="save-config" class="btn primary">Apply config</button>
        </section>

        <section class="block">
          <h3>Workspace</h3>
          <label for="workspace">Workspace path</label>
          <div class="row compact">
            <input id="workspace" value="/tmp/work" />
            <button id="browse-workspace" class="btn" type="button">Browse</button>
          </div>
          <input id="workspace-picker" type="file" webkitdirectory directory multiple class="hidden" />
        </section>

        <section class="block">
          <h3>Sessions</h3>
          <div class="row compact">
            <button id="create-session" class="btn">New</button>
            <button id="refresh-sessions" class="btn">Refresh</button>
          </div>
          <label for="session-quick-switch">Quick switch</label>
          <input id="session-quick-switch" placeholder="Type + Enter to switch by id prefix" />
          <ul id="session-list" class="session-list"></ul>
          <div id="session-summary" class="muted">No session selected.</div>
          <div id="session-state" class="state-pill idle">idle</div>
        </section>
      </aside>

      <button id="left-resizer" class="resizer resizer-left" type="button" aria-label="Resize left panel" title="Drag to resize"></button>

      <main class="panel center">
        <header class="chat-header">
          <div class="brand-wrap">
            <button id="toggle-left" class="icon-btn" type="button" aria-label="Toggle left panel">☰</button>
            <div class="brand">mu_cli</div>
            <span id="active-model" class="pill">provider: ollama</span>
          </div>
          <div class="header-actions">
            <div id="active-status" class="state-pill idle">idle</div>
            <button id="toggle-right" class="icon-btn" type="button" aria-label="Toggle right panel">☷</button>
          </div>
        </header>

        <section class="chat-window" id="chat-window">
          <div class="empty-state">Start by creating/selecting a session, then send a prompt.</div>
        </section>

        <section class="composer">
          <textarea id="goal" rows="3" placeholder="Message mu_cli..."></textarea>
          <div class="row">
            <button id="create-job" class="btn primary">Send</button>
            <button id="refresh-approvals" class="btn">Refresh approvals</button>
          </div>
        </section>
      </main>

      <button id="right-resizer" class="resizer resizer-right" type="button" aria-label="Resize right panel" title="Drag to resize"></button>

      <aside class="panel right">
        <div class="panel-title">Session metadata</div>

        <section class="block">
          <h3>Live backend feed</h3>
          <div class="meta-filters" id="meta-filters">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="loop_step">Tool loop</button>
            <button class="chip" data-filter="job_state">Status</button>
            <button class="chip" data-filter="log">Logs</button>
            <button class="chip" data-filter="policy">Policy</button>
            <button class="chip" data-filter="approval">Approval</button>
          </div>
          <ul id="timeline" class="meta-list"></ul>
        </section>

        <section class="block">
          <h3>Pending approvals</h3>
          <ul id="approvals" class="meta-list"></ul>
        </section>
      </aside>
    </div>

    <div id="session-settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="session-settings-title">
      <div class="modal-card">
        <h3 id="session-settings-title">Session settings</h3>
        <div class="modal-body">
          <label for="modal-session-name">Session name</label>
          <input id="modal-session-name" />

          <label for="modal-model">Model</label>
          <select id="modal-model"></select>

          <label for="modal-mode">Mode</label>
          <select id="modal-mode">
            <option value="interactive">interactive</option>
            <option value="research">research</option>
            <option value="debugging">debugging</option>
            <option value="yolo">yolo</option>
          </select>

          <label for="modal-policy">Policy profile</label>
          <select id="modal-policy"></select>

          <label for="modal-providers">Provider</label>
          <select id="modal-providers"></select>
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn">Cancel</button>
          <button id="modal-save" class="btn primary">Save</button>
        </div>
      </div>
    </div>

    <script src="/gui/assets/app.js"></script>
  </body>
</html>
